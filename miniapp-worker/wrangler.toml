name = "miniapp-worker"
main = "src/worker.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Serve the Vite-built SPA (dist/) as static assets, with SPA fallback.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Configure secrets with:
#   bunx wrangler secret put BOT_SYNC_URL      # e.g. https://bot-buddy-hook.lovable.app/api/public/bot/bridge
#   bunx wrangler secret put BOT_SYNC_SECRET   # same value as Lovable's BOT_SYNC_SECRET
#
# To attach a custom domain after deploy, use:
#   Cloudflare Dashboard -> Workers & Pages -> miniapp-worker -> Settings -> Domains & Routes -> Add Custom Domain
